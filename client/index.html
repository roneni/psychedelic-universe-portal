<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes" />
    <title>Psychedelic Universe - The Global Hub for Psytrance Culture</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="The global hub for psychedelic trance culture. 5,000+ mixes from Progressive Psytrance, Goa Trance, Full-On, and more. Connecting artists, labels, and fans since 2013." />
    <meta name="keywords" content="psytrance, psychedelic trance, goa trance, progressive psytrance, full-on, electronic music, trance music" />
    <meta name="author" content="Psychedelic Universe" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Psychedelic Universe - The Global Hub for Psytrance Culture" />
    <meta property="og:description" content="5,000+ mixes from Progressive Psytrance, Goa Trance, Full-On, and more." />
    <meta property="og:image" content="/icons/logo-512x512.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#00d4ff" />
    <meta name="msapplication-TileColor" content="#0a0a0f" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    
    <!-- Apple Touch Icon & PWA -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Psy Universe" />
    
    <!-- Apple Splash Screens for various iPhone sizes -->
    <link rel="apple-touch-startup-image" href="/icons/logo-512x512.png" />
    
    <!-- Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Google Fonts - Orbitron for cyber-shamanic aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
